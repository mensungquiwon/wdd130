<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles/poll-form.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="with=device-width, initial-scale=1">
        <title>WDD130 | HTML Form - user poll </title>   
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
   </head>
    <body>
        <header>
            <h1>WDD130 | Your Name| HTML Form - user poll</h1>
        </header>
        <main>
            <form>
                <fieldset>
                    <lengend>Contact Information</lengend>
                    <div class="form-item column2">
                        <label for ="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname">
                    </div>
                    <div class="form-item column2">
                        <label for ="useremail">Useremail</label>
                        <input type="email" id="useremail" name="useremail">
                    </div>
                </fieldset>
                <fiedset>
                    <lengend>Question</lengend>
                    <div class="form-item column1">
                        <label for="browser">What is your favorite browser?</label>
                        <select id="browser" name="browser">
                            <option value="chrome">Chrome</option>
                            <option value="firefox">Firefox</option>
                            <option value="safari">Safari</option>
                            <option value="edge">Edge</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu"></textarea>
                </fiedset>
                <button type="submit">Submit Poll</button>
            </form>

        </main>
    </body>
    <footer>
        <p> 2025 | HTML Form - User poll Activity| Your Name </p>

    </footer>
</html>
